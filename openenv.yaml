# OpenEnv-style metadata for TransitRL (HTTP + FastAPI)
spec_version: "1"

name: TransitRL
description: Real-world ride-hailing RL environment for driver-rider assignment under wait-time and demand-supply constraints.

runtime: fastapi
app: app:app
port: 8000

action_space:
  type: object
  schema:
    driver_id: integer
    rider_id: integer
  description: >
    Pair (driver_id, rider_id) assigning an idle driver to a waiting rider.
    Invalid pairs, busy drivers, or pairs with Manhattan distance > 6 are rejected or penalized.

observation_space:
  type: object
  schema:
    drivers: array
    riders: array
    time: integer
  description: >
    drivers entries include id, x, y, busy, idle_time; riders include id, x, y, wait_time; time is global clock.

tasks:
  - id: easy
    name: TransitRL Easy
    description: Low demand, many drivers (easy matching).
    difficulty: easy
    max_steps: 50
    reward_range: [0.0, 1.0]
    reset_payload:
      task: easy
    grader: graders:grade_easy
    graders:
      - graders:grade_easy
    has_grader: true
    enabled: true
  - id: medium
    name: TransitRL Medium
    description: Balanced demand and supply.
    difficulty: medium
    max_steps: 50
    reward_range: [0.0, 1.0]
    reset_payload:
      task: medium
    grader: graders:grade_medium
    graders:
      - graders:grade_medium
    has_grader: true
    enabled: true
  - id: hard
    name: TransitRL Hard
    description: Peak-hour surge with high demand, limited drivers, slower completions.
    difficulty: hard
    max_steps: 50
    reward_range: [0.0, 1.0]
    reset_payload:
      task: hard
    grader: graders:grade_hard
    graders:
      - graders:grade_hard
    has_grader: true
    enabled: true

graders:
  - task_id: easy
    enabled: true
    entrypoint: graders:grade_easy
  - task_id: medium
    enabled: true
    entrypoint: graders:grade_medium
  - task_id: hard
    enabled: true
    entrypoint: graders:grade_hard

endpoints:
  health: GET /health
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
