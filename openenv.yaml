# OpenEnv manifest — keep in sync with Dockerfile port and app entrypoint.
spec_version: 1

name: TransitRL
description: Real-world ride-hailing RL environment for driver-rider assignment under wait-time and demand-supply constraints.

runtime: fastapi
app: app:app
port: 7860

action_space:
  type: object
  schema:
    driver_id: integer
    rider_id: integer
  description: >
    Pair (driver_id, rider_id) assigning an idle driver to a waiting rider.

observation_space:
  type: object
  schema:
    drivers: array
    riders: array
    time: integer
  description: >
    drivers include id, x, y, busy, idle_time, rides_completed; riders include id, x, y, wait_time.

# Three graded tasks — each has a real on-disk grader module under graders/.
tasks:
  - id: easy
    name: TransitRL Easy
    description: Low demand, many drivers (easy matching).
    difficulty: easy
    max_steps: 50
    reward_range: [0.0, 1.0]
    reset_payload:
      task: easy
    grader: "graders.easy:evaluate"
    grader_path: graders/easy.py
    grader_entrypoint: evaluate
    graders:
      - "graders.easy:evaluate"
    has_grader: true
    enabled: true

  - id: medium
    name: TransitRL Medium
    description: Balanced demand and supply.
    difficulty: medium
    max_steps: 50
    reward_range: [0.0, 1.0]
    reset_payload:
      task: medium
    grader: "graders.medium:evaluate"
    grader_path: graders/medium.py
    grader_entrypoint: evaluate
    graders:
      - "graders.medium:evaluate"
    has_grader: true
    enabled: true

  - id: hard
    name: TransitRL Hard
    description: Peak-hour surge with high demand, limited drivers, slower completions.
    difficulty: hard
    max_steps: 50
    reward_range: [0.0, 1.0]
    reset_payload:
      task: hard
    grader: "graders.hard:evaluate"
    grader_path: graders/hard.py
    grader_entrypoint: evaluate
    graders:
      - "graders.hard:evaluate"
    has_grader: true
    enabled: true

graders:
  - task_id: easy
    enabled: true
    entrypoint: "graders.easy:evaluate"
    path: graders/easy.py
  - task_id: medium
    enabled: true
    entrypoint: "graders.medium:evaluate"
    path: graders/medium.py
  - task_id: hard
    enabled: true
    entrypoint: "graders.hard:evaluate"
    path: graders/hard.py

endpoints:
  health: GET /health
  metadata: GET /metadata
  schema: GET /schema
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
